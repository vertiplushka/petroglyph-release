# HTTPS config — activated by init-letsencrypt.sh after certificates are issued.

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  # HTTP → HTTPS redirect + ACME renewal
  server {
    listen 80;
    server_name altaiguide.ru www.altaiguide.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2  on;
    server_name altaiguide.ru www.altaiguide.ru;

    ssl_certificate     /etc/letsencrypt/live/altaiguide.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/altaiguide.ru/privkey.pem;

    # Modern TLS — no external includes needed
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                           always;
    add_header X-Content-Type-Options     nosniff                              always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;

    # NestJS backend
    location /v1/ {
      proxy_pass         http://backend:4000/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AI chat stream — buffering off for SSE
    location /api/chat {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_buffering    off;
      proxy_read_timeout 120s;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js frontend
    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
