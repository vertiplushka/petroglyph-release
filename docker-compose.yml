services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:         ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 30s

  # ── NestJS backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:    mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      PORT:            4000
      JWT_SECRET:      ${JWT_SECRET}
      ADMIN_USERNAME:  ${ADMIN_USERNAME}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY:      ${ANTHROPIC_API_KEY}
      ANTHROPIC_API_BASE_URL: ${ANTHROPIC_API_BASE_URL:-https://api.novimundi.space/v1}
      ANTHROPIC_MODEL:        ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      BACKEND_INTERNAL_URL:   http://backend:4000
      INTERNAL_SECRET:        ${INTERNAL_SECRET}
      JWT_SECRET:             ${JWT_SECRET}
    depends_on:
      - backend

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx-ssl.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - frontend
      - backend

  # ── Certbot (auto-renew every 12 h) ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  mysql_data:
  uploads_data:
  certbot_www:
  certbot_certs:
